# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts}"
      run: bun oxlint --fix {staged_files}
      stage_fixed: true
    - name: oxfmt
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts,json}"
      run: bun oxfmt --write {staged_files}
      stage_fixed: true
