name: Deploy Azure

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - staging
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy-staging:
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: az group create --name "${{ vars.AZURE_RESOURCE_GROUP }}" --location "${{ vars.AZURE_LOCATION }}"

      - name: Bootstrap shared staging infrastructure
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --parameters infra/params/staging.bicepparam deployApps=false > /tmp/staging-bootstrap.json

          echo "ACR_NAME=$(jq -r '.properties.outputs.containerRegistryName.value' /tmp/staging-bootstrap.json)" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$(jq -r '.properties.outputs.containerRegistryLoginServer.value' /tmp/staging-bootstrap.json)" >> "$GITHUB_ENV"

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.dashboard
          context: .
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/dashboard:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/dashboard:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/dashboard:buildcache,mode=max
          build-args: |
            VITE_SERVER_URL=${{ vars.SERVER_URL }}
            VITE_DASHBOARD_URL=${{ vars.DASHBOARD_URL }}
            VITE_WEBSITE_URL=${{ vars.WEBSITE_URL }}
            VITE_CLOUDINARY_CLOUD_NAME=${{ vars.CLOUDINARY_CLOUD_NAME }}

      - name: Record dashboard image tag
        run: echo "DASHBOARD_IMAGE=$ACR_LOGIN_SERVER/dashboard:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.server
          context: .
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/server:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/server:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/server:buildcache,mode=max

      - name: Record server image tag
        run: echo "SERVER_IMAGE=$ACR_LOGIN_SERVER/server:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Deploy staging apps
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --parameters infra/params/staging.bicepparam deployApps=true dashboardImage="$DASHBOARD_IMAGE" serverImage="$SERVER_IMAGE" > /tmp/staging-deploy.json

          echo "Dashboard default URL: $(jq -r '.properties.outputs.dashboardDefaultUrl.value' /tmp/staging-deploy.json)"
          echo "Server default URL: $(jq -r '.properties.outputs.serverDefaultUrl.value' /tmp/staging-deploy.json)"

  deploy-production:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: az group create --name "${{ vars.AZURE_RESOURCE_GROUP }}" --location "${{ vars.AZURE_LOCATION }}"

      - name: Bootstrap shared production infrastructure
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --parameters infra/params/prod.bicepparam deployApps=false > /tmp/prod-bootstrap.json

          echo "ACR_NAME=$(jq -r '.properties.outputs.containerRegistryName.value' /tmp/prod-bootstrap.json)" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=$(jq -r '.properties.outputs.containerRegistryLoginServer.value' /tmp/prod-bootstrap.json)" >> "$GITHUB_ENV"

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.dashboard
          context: .
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/dashboard:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/dashboard:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/dashboard:buildcache,mode=max
          build-args: |
            VITE_SERVER_URL=${{ vars.SERVER_URL }}
            VITE_DASHBOARD_URL=${{ vars.DASHBOARD_URL }}
            VITE_WEBSITE_URL=${{ vars.WEBSITE_URL }}
            VITE_CLOUDINARY_CLOUD_NAME=${{ vars.CLOUDINARY_CLOUD_NAME }}

      - name: Record dashboard image tag
        run: echo "DASHBOARD_IMAGE=$ACR_LOGIN_SERVER/dashboard:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile.server
          context: .
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/server:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/server:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/server:buildcache,mode=max

      - name: Record server image tag
        run: echo "SERVER_IMAGE=$ACR_LOGIN_SERVER/server:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Deploy production apps
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --parameters infra/params/prod.bicepparam deployApps=true dashboardImage="$DASHBOARD_IMAGE" serverImage="$SERVER_IMAGE" > /tmp/prod-deploy.json

          echo "Dashboard default URL: $(jq -r '.properties.outputs.dashboardDefaultUrl.value' /tmp/prod-deploy.json)"
          echo "Server default URL: $(jq -r '.properties.outputs.serverDefaultUrl.value' /tmp/prod-deploy.json)"
